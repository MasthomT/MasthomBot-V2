name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://ci:ci@localhost/ci_db
      ADMIN_PASSWORD: ci-test-password
      ADMIN_SESSION_SECRET: ci-test-secret
      OPENAI_API_KEY: ""
      TWITCH_CLIENT_ID: ""
      TWITCH_CLIENT_SECRET: ""
      TWITCH_OAUTH_TOKEN: ""
      DISCORD_TOKEN: ""

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint (ruff)
        run: ruff check app/ --select=E9,F --output-format=github
        continue-on-error: true

      - name: Run smoke tests
        run: python -m pytest tests/ -v
