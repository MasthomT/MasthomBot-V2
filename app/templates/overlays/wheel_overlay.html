<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background: transparent; font-family: 'Inter', sans-serif; }

        #wheel-wrap {
            position: absolute; top: 50%; left: 50%;
            width: 440px; height: 440px;
            transform: translate(-50%, -50%) scale(0.9);
            opacity: 0;
            transition: opacity 0.4s ease, transform 0.4s ease;
        }
        #wheel-wrap.visible { opacity: 1; transform: translate(-50%, -50%) scale(1); }

        #wheel-disc {
            width: 100%; height: 100%; border-radius: 50%;
            border: 7px solid #9146ff;
            box-shadow: 0 0 0 4px rgba(15,23,42,0.95), 0 30px 70px rgba(0,0,0,0.75), 0 0 50px rgba(145,70,255,0.45);
            position: relative;
            transition: transform 5.5s cubic-bezier(0.12, 0.65, 0.1, 1);
        }

        #wheel-disc svg { width: 100%; height: 100%; border-radius: 50%; display: block; }

        .segment-label {
            font-weight: 900; fill: #ffffff;
            paint-order: stroke fill;
            stroke: rgba(0,0,0,0.55); stroke-width: 3.5px; stroke-linejoin: round;
        }

        #pointer-wrap {
            position: absolute; top: -28px; left: 50%; transform: translateX(-50%);
            z-index: 10; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.6));
        }
        #pointer {
            width: 0; height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 36px solid #fbbf24;
            position: relative;
        }
        #pointer::after {
            content: ''; position: absolute; top: -34px; left: -6px;
            width: 12px; height: 12px; border-radius: 50%; background: #fde68a;
        }

        #hub {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 68px; height: 68px; border-radius: 50%;
            background: radial-gradient(circle at 35% 30%, #d8b4fe, #6d28d9 70%);
            border: 4px solid #1e1b4b;
            box-shadow: 0 4px 14px rgba(0,0,0,0.55), inset 0 2px 6px rgba(255,255,255,0.25);
            z-index: 5;
            display: flex; align-items: center; justify-content: center;
        }
        #hub::after {
            content: '★'; color: #fff; font-size: 20px; opacity: 0.85;
        }

        #result-banner {
            position: absolute; top: calc(50% + 265px); left: 50%;
            transform: translateX(-50%) translateY(14px) scale(0.85);
            background: linear-gradient(160deg, rgba(30,27,75,0.97), rgba(15,23,42,0.97));
            border: 2px solid #fbbf24; border-radius: 22px;
            padding: 16px 36px; text-align: center;
            opacity: 0; transition: opacity 0.45s cubic-bezier(0.34,1.56,0.64,1), transform 0.45s cubic-bezier(0.34,1.56,0.64,1);
            white-space: nowrap;
            box-shadow: 0 20px 45px rgba(0,0,0,0.6), 0 0 30px rgba(251,191,36,0.25);
        }
        #result-banner.visible { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
        #result-banner .label {
            color: #fbbf24; font-size: 0.7rem; font-weight: 900; text-transform: uppercase;
            letter-spacing: 0.15em; display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        #result-banner .value { color: #fff; font-size: 1.6rem; font-weight: 900; margin-top: 4px; text-shadow: 0 2px 8px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <div id="wheel-wrap">
        <div id="pointer-wrap"><div id="pointer"></div></div>
        <div id="wheel-disc">
            <svg id="wheel-svg" viewBox="0 0 200 200"></svg>
        </div>
        <div id="hub"></div>
    </div>
    <div id="result-banner">
        <div class="label">🎉 Résultat 🎉</div>
        <div class="value" id="result-value"></div>
    </div>

    <script>
        const WHEEL_ID = {{ wheel_id }};
        const wrap = document.getElementById('wheel-wrap');
        const disc = document.getElementById('wheel-disc');
        const svg = document.getElementById('wheel-svg');
        const banner = document.getElementById('result-banner');
        const resultValue = document.getElementById('result-value');

        let items = [];
        let currentRotation = 0;

        function polarToCartesian(cx, cy, r, angleDeg) {
            const angleRad = (angleDeg - 90) * Math.PI / 180;
            return { x: cx + r * Math.cos(angleRad), y: cy + r * Math.sin(angleRad) };
        }

        // Découpe un libellé en plusieurs lignes (jamais en coupant un mot) pour qu'il tienne
        // dans une largeur donnée, en estimant la largeur d'un caractère à partir de la police.
        function wrapLabel(label, fontSize, maxWidth) {
            const avgCharWidth = fontSize * 0.58;
            const maxCharsPerLine = Math.max(1, Math.floor(maxWidth / avgCharWidth));
            const words = label.split(/\s+/).filter(Boolean);
            const lines = [];
            let current = '';

            for (const word of words) {
                const candidate = current ? `${current} ${word}` : word;
                if (candidate.length <= maxCharsPerLine || !current) {
                    current = candidate;
                } else {
                    lines.push(current);
                    current = word;
                }
            }
            if (current) lines.push(current);
            return lines;
        }

        function renderWheel() {
            const n = items.length;
            if (n === 0) return;
            const cx = 100, cy = 100, r = 100;
            const anglePer = 360 / n;
            const labelRadius = r * 0.66;
            // Largeur disponible (corde du segment à ce rayon) — sert à savoir combien de
            // caractères tiennent sur une ligne avant de passer à la suivante.
            const chordWidth = 2 * labelRadius * Math.sin((anglePer * Math.PI / 180) / 2);
            let fontSize = n <= 4 ? 15 : n <= 6 ? 13 : n <= 8 ? 11 : 9.5;

            let defsHtml = '';
            let shapesHtml = '';
            let labelsHtml = '';

            for (let i = 0; i < n; i++) {
                const startAngle = i * anglePer;
                const endAngle = startAngle + anglePer;
                const p1 = polarToCartesian(cx, cy, r, startAngle);
                const p2 = polarToCartesian(cx, cy, r, endAngle);
                const largeArc = anglePer > 180 ? 1 : 0;
                const color = items[i].color || '#6366f1';
                const wedgePath = `M${cx},${cy} L${p1.x.toFixed(2)},${p1.y.toFixed(2)} A${r},${r} 0 ${largeArc} 1 ${p2.x.toFixed(2)},${p2.y.toFixed(2)} Z`;

                shapesHtml += `<path d="${wedgePath}" fill="${color}" stroke="#0f172a" stroke-width="1.5"></path>`;
                // Un clipPath par segment empêche le texte de "baver" visuellement sur le
                // segment voisin si jamais une ligne dépasse un peu la place disponible.
                defsHtml += `<clipPath id="wedge-clip-${i}"><path d="${wedgePath}"></path></clipPath>`;

                const midAngle = startAngle + anglePer / 2;
                const labelPos = polarToCartesian(cx, cy, labelRadius, midAngle);
                const rawLabel = items[i].label || '';

                // On essaie d'abord à la taille "normale" ; si ça fait trop de lignes (texte
                // long sur segment étroit), on réduit la police par étapes — jamais le texte.
                let segFontSize = fontSize;
                let lines = wrapLabel(rawLabel, segFontSize, chordWidth);
                while (lines.length > 3 && segFontSize > 7) {
                    segFontSize -= 1;
                    lines = wrapLabel(rawLabel, segFontSize, chordWidth);
                }

                // On garde le texte "à l'endroit" même sur la moitié basse de la roue, en
                // ajoutant 180° de rotation supplémentaire — sinon il apparaît tête en bas.
                const flip = (midAngle % 360 > 90 && midAngle % 360 < 270) ? midAngle + 180 : midAngle;
                const lineHeight = segFontSize * 1.15;
                const startDy = -((lines.length - 1) * lineHeight) / 2;
                const tspans = lines.map((line, li) =>
                    `<tspan x="${labelPos.x.toFixed(2)}" dy="${li === 0 ? startDy.toFixed(2) : lineHeight.toFixed(2)}">${escapeHtml(line)}</tspan>`
                ).join('');

                labelsHtml += `<g clip-path="url(#wedge-clip-${i})"><text x="${labelPos.x.toFixed(2)}" y="${labelPos.y.toFixed(2)}" class="segment-label" font-size="${segFontSize}" text-anchor="middle" transform="rotate(${flip.toFixed(2)}, ${labelPos.x.toFixed(2)}, ${labelPos.y.toFixed(2)})">${tspans}</text></g>`;
            }
            svg.innerHTML = `<defs>${defsHtml}</defs>${shapesHtml}${labelsHtml}`;
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str || '';
            return div.innerHTML;
        }

        async function loadWheel() {
            try {
                const res = await fetch(`/api/v1/wheels/${WHEEL_ID}`);
                if (!res.ok) return;
                const data = await res.json();
                items = data.items || [];
                renderWheel();
                wrap.classList.add('visible');
            } catch (e) { console.error('Erreur chargement roue:', e); }
        }

        function spinTo(winnerIndex) {
            const n = items.length;
            if (n === 0) return;
            const anglePer = 360 / n;
            // Le pointeur est en haut (angle 0 = midi). Le segment "winnerIndex" est centré à
            // (winnerIndex * anglePer + anglePer/2). On tourne la roue pour amener ce centre
            // sous le pointeur, plus plusieurs tours complets pour l'effet, avec un petit
            // décalage aléatoire pour ne pas toujours tomber pile au centre du segment.
            const segmentCenter = winnerIndex * anglePer + anglePer / 2;
            const jitter = (Math.random() - 0.5) * (anglePer * 0.6);
            const extraSpins = 6 + Math.floor(Math.random() * 3); // 6 à 8 tours
            const targetRotation = currentRotation + extraSpins * 360 + (360 - segmentCenter) - (currentRotation % 360) + jitter;

            banner.classList.remove('visible');
            currentRotation = targetRotation;
            disc.style.transform = `rotate(${targetRotation}deg)`;

            setTimeout(() => {
                resultValue.textContent = items[winnerIndex].label || '';
                banner.classList.add('visible');
                setTimeout(() => banner.classList.remove('visible'), 8000);
            }, 5600);
        }

        const eventSource = new EventSource('/overlay_events');
        eventSource.onmessage = (e) => {
            const data = JSON.parse(e.data);
            if (data.type === 'spin_wheel' && data.wheel_id === WHEEL_ID) {
                spinTo(data.winner_index);
            }
        };

        loadWheel();
    </script>
</body>
</html>
