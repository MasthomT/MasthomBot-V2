<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Générique de Fin - MasthomBot</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-chatters: #00e5ff;
            --color-followers: #a970ff;
            --color-subs: #ffd700;
            --color-bits: #ff4500;
            --color-raiders: #ff9100;
            --color-vips: #ff69b4;
            --color-mods: #00ff00;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: transparent; 
            font-family: 'Kanit', sans-serif; color: white; 
        }
        
        #scroll-container {
            position: absolute; top: 100vh; left: 0; width: 100%;
            display: flex; flex-direction: column; align-items: center;
        }

        .main-title { font-size: 6rem; font-weight: 900; text-transform: uppercase; text-shadow: 0 0 20px rgba(255,255,255,0.6); margin-bottom: 50px; text-align: center; }
        .section-header { margin-top: 80px; margin-bottom: 30px; text-align: center; }
        .section-title { font-size: 3.5rem; font-weight: 700; text-transform: uppercase; border-bottom: 6px solid currentColor; padding: 0 50px 10px; display: inline-block; letter-spacing: 5px; }
        
        .names-wrapper { width: 90%; display: flex; flex-wrap: wrap; justify-content: center; gap: 20px 60px; }
        .name-card { font-size: 2.5rem; font-weight: 600; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); white-space: nowrap; }
        .badge-info { font-size: 0.6em; background: rgba(255, 255, 255, 0.15); padding: 2px 12px; border-radius: 15px; margin-left: 15px; vertical-align: middle; }

        .subtitle { font-size: 3rem; font-weight: 300; color: #ccc; letter-spacing: 12px; margin-top: 150px; text-align: center; text-transform: uppercase; }

        /* Couleurs dynamiques */
        .color-subscribers { color: var(--color-subs); }
        .color-bits { color: var(--color-bits); }
        .color-raiders { color: var(--color-raiders); }
        .color-followers { color: var(--color-followers); }
        .color-moderators { color: var(--color-mods); }
        .color-vips { color: var(--color-vips); }
        .color-chatters { color: var(--color-chatters); }

        .labels {
            subscribers: "NOS ABONNÉS",
            raiders: "LES RAIDS DU JOUR",
            bits: "LES DONATEURS",
            followers: "BIENVENUE AUX NOUVEAUX",
            moderators: "L'ÉQUIPE DE MODÉRATION",
            vips: "NOS INVITÉS SPÉCIAUX",
            chatters: "LE CHAT EN FEU"
        }
    </style>
</head>
<body>
    <div id="scroll-container"></div>

<script>
    const LABELS = {
        subscribers: 'NOS ABONNÉS',
        gifters: 'LES GÉNÉREUX',
        bits: 'LES DONATEURS',
        raiders: 'LES RAIDS DU JOUR',
        followers: 'BIENVENUE !',
        moderators: 'NOS MODOS',
        vips: 'LES VIP',
        chatters: 'LES BAVARDS'
    };

    async function init() {
        try {
            const resp = await fetch('/api/credits/data');
            const data = await resp.json();
            const container = document.getElementById('scroll-container');
            
            // 1. Titre
            container.innerHTML = `<h1 class="main-title">${data.config.main_title}</h1>`;

            // 2. Sections
            data.config.order.forEach(key => {
                const items = data.stats[key] || [];
                if (items.length > 0) {
                    const sectionHtml = `
                        <div class="section-header color-${key}">
                            <div class="section-title">${LABELS[key] || key.toUpperCase()}</div>
                        </div>
                        <div class="names-wrapper">
                            ${items.map(i => `
                                <div class="name-card color-${key}">
                                    ${i.name} ${i.label ? `<span class="badge-info">${i.label}</span>` : ''}
                                </div>
                            `).join('')}
                        </div>
                    `;
                    container.insertAdjacentHTML('beforeend', sectionHtml);
                }
            });

            // 3. Fin
            container.insertAdjacentHTML('beforeend', `<h2 class="subtitle">${data.config.subtitle}</h2><div style="height:110vh"></div>`);

            // 4. Animation
            setTimeout(() => {
                const distance = container.offsetHeight + window.innerHeight;
                container.style.transition = `transform ${data.config.duration}s linear`;
                container.style.transform = `translateY(-${distance}px)`;
            }, 2000);

        } catch (e) { console.error(e); }
    }
    window.onload = init;
</script>
</body>
</html>
