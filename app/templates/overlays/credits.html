<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Générique de Fin - OBS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: transparent; 
        }
        
        body, html {
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            background: var(--bg);
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }
        
        #credits-container {
            position: absolute;
            top: 100vh; 
            left: 0;
            width: 100vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            color: white;
        }

        .main-title {
            font-size: 5.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin-bottom: 5rem;
            color: #fff;
            text-shadow: 0 10px 40px rgba(99, 102, 241, 0.6);
        }

        .sub-title {
            font-size: 3.5rem;
            font-weight: 800;
            margin-top: 6rem;
            margin-bottom: 50vh; 
            color: #94a3b8;
            text-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }

        .section {
            margin-bottom: 4.5rem;
            width: 95%; 
            max-width: 1400px;
        }

        .section-title {
            font-size: 2.2rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid rgba(255,255,255,0.05);
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .names-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1.5rem;
        }

        .name-item {
            background: rgba(15, 23, 42, 0.85);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 14px 24px;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex: 0 0 calc(33.333% - 1rem);
            box-sizing: border-box;
            gap: 15px;
        }

        .user-name {
            font-size: 1.4rem;
            font-weight: 700;
            color: #f8fafc;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-align: left;
        }

        .user-label {
            background: rgba(255,255,255,0.08);
            padding: 6px 12px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 800;
            color: #cbd5e1;
            font-family: 'JetBrains Mono', monospace;
            display: flex;
            align-items: center;
            white-space: nowrap;
            flex-shrink: 0; 
        }
    </style>
</head>
<body>
    <div id="credits-container"></div>

    <script>
        // Journalisation silencieuse (console uniquement, plus de bandeau à l'écran)
        const log = (m) => { try { console.log('[credits]', m); } catch (e) {} };

        const MODULES = {
            'subscribers': { label: '🌟 Abonnés', color: '#fbbf24' },
            'gifters':     { label: '🎁 Mécènes (Gifts)', color: '#34d399' },
            'bits':        { label: '💎 Bits & Donations', color: '#fb7185' },
            'raiders':     { label: '🚀 Raids Reçus', color: '#fb923c' },
            'followers':   { label: '💙 Nouveaux Followers', color: '#a78bfa' },
            'vips':        { label: '⭐ VIPs (Guests)', color: '#f472b6' },
            'moderators':  { label: '🛡️ Modérateurs', color: '#a3e635' },
            'chatters':    { label: '💬 Chatters', color: '#22d3ee' },
            'viewers':     { label: '👀 Viewers', color: '#94a3b8' }
        };

        function formatWatchtime(minutes) {
            if (!minutes || minutes <= 0) return '';
            let h = Math.floor(minutes / 60);
            let m = minutes % 60;
            let timeStr = h > 0 ? `${h}h${m < 10 ? '0'+m : m}` : `${m} min`;
            return `<span class="user-label"><i class="fas fa-clock" style="margin-right: 6px;"></i>${timeStr}</span>`;
        }

        let animationEnCours = null;
        let chargementEnCours = false;

        function construireHtml(stats, config) {
            let html = `<h1 class="main-title">${config.main_title || 'MERCI À TOUS !'}</h1>`;
            const order = (config && config.order) ? config.order : Object.keys(MODULES);
            for (let key of order) {
                if (key === 'viewers') continue;
                if (!stats[key] || stats[key].length === 0) continue;
                html += `<div class="section ${key}">`;
                html += `<h2 class="section-title" style="color: ${MODULES[key] ? MODULES[key].color : '#fff'}">${MODULES[key] ? MODULES[key].label : key}</h2>`;
                html += `<div class="names-grid">`;
                stats[key].forEach(user => {
                    let labelHtml = "";
                    if (key === 'subscribers') {
                        let val = user.months || user.label || '1';
                        labelHtml = `<span class="user-label"><i class="fas fa-star" style="margin-right: 6px; color: #fbbf24;"></i>${val} mois</span>`;
                    } else if (['gifters', 'bits', 'raiders', 'followers'].includes(key)) {
                        labelHtml = user.label ? `<span class="user-label">${user.label}</span>` : '';
                    } else if (['moderators', 'vips', 'chatters'].includes(key)) {
                        let msgs = user.messages || 0;
                        if (msgs > 0) labelHtml = `<span class="user-label">${msgs} msg</span>`;
                    }
                    html += `<div class="name-item"><span class="user-name">${user.name}</span>${labelHtml}</div>`;
                });
                html += `</div></div>`;
            }
            if (stats['viewers'] && stats['viewers'].length > 0) {
                html += `<div class="section viewers">`;
                html += `<h2 class="section-title" style="color: ${MODULES['viewers'].color}">👀 Viewers</h2>`;
                html += `<div class="names-grid">`;
                stats['viewers'].forEach(user => {
                    let watchtimeHtml = user.watchtime > 0 ? formatWatchtime(user.watchtime) : '';
                    html += `<div class="name-item"><span class="user-name">${user.name}</span>${watchtimeHtml}</div>`;
                });
                html += `</div></div>`;
            }
            html += `<h1 class="sub-title">${config.subtitle || 'À BIENTÔT SUR LE LIVE'}</h1>`;
            return html;
        }

        function lancerAnimation(config) {
            const container = document.getElementById('credits-container');
            // Mesure APRÈS la mise en page du navigateur (2 frames), sans attendre les polices
            requestAnimationFrame(() => requestAnimationFrame(() => {
                const totalHeight = container.scrollHeight;
                const duration = (config && config.duration) ? config.duration : 60;
                log(`anim h=${totalHeight} win=${window.innerHeight} dur=${duration}s`);
                if (animationEnCours) animationEnCours.cancel();
                animationEnCours = container.animate([
                    { transform: 'translateY(0px)' },
                    { transform: `translateY(-${totalHeight + window.innerHeight}px)` }
                ], { duration: duration * 1000, easing: 'linear', fill: 'forwards' });
            }));
        }

        async function loadCredits() {
            if (chargementEnCours) return;
            chargementEnCours = true;
            const container = document.getElementById('credits-container');
            try {
                if (animationEnCours) { animationEnCours.cancel(); animationEnCours = null; }
                log('fetch…');
                // Timeout CLIENT : si le serveur ne répond pas en 6s, on abandonne et on affiche quand même
                const ctrl = new AbortController();
                const minuteur = setTimeout(() => ctrl.abort(), 6000);
                let stats = {}, config = {};
                try {
                    const res = await fetch('/api/credits/data?t=' + Date.now(), { cache: 'no-store', signal: ctrl.signal });
                    const data = await res.json();
                    stats = data.stats || {};
                    config = data.config || {};
                    log('data OK');
                } catch (errFetch) {
                    // Même si la donnée échoue/timeout, on n'affiche JAMAIS un écran noir : au moins le titre
                    log('data KO: ' + (errFetch.name || errFetch));
                } finally {
                    clearTimeout(minuteur);
                }
                container.innerHTML = construireHtml(stats, config);
                lancerAnimation(config);
            } catch (e) {
                log('ERREUR: ' + (e.message || e));
            } finally {
                chargementEnCours = false;
            }
        }

        // 🎬 DÉCLENCHEMENT FIABLE DU GÉNÉRIQUE
        // 1. Au chargement de la page (petit délai pour laisser OBS finir le rendu)
        setTimeout(loadCredits, 500);

        // 2. Événement officiel OBS : la source vient d'apparaître à l'écran
        //    (= tu bascules sur ta scène de fin). On rejoue le générique du début.
        window.addEventListener('obsSourceVisibleChanged', (event) => {
            if (event.detail && event.detail.visible) loadCredits();
        });
        // Certaines versions d'OBS utilisent "active" plutôt que "visible"
        window.addEventListener('obsSourceActiveChanged', (event) => {
            if (event.detail && event.detail.active) loadCredits();
        });

        // 3. Filet de sécurité générique : si la page redevient visible, on relance
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) loadCredits();
        });
    </script>
</body>
</html>
