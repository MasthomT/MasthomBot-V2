<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Générique de Fin - OBS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: transparent; 
        }
        
        body, html {
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            background: var(--bg);
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }
        
        #credits-container {
            position: absolute;
            top: 100vh; 
            left: 0;
            width: 100vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            color: white;
        }

        .main-title {
            font-size: 5.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin-bottom: 5rem;
            color: #fff;
            text-shadow: 0 10px 40px rgba(99, 102, 241, 0.6);
        }

        .sub-title {
            font-size: 3.5rem;
            font-weight: 800;
            margin-top: 6rem;
            margin-bottom: 50vh; 
            color: #94a3b8;
            text-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }

        .section {
            margin-bottom: 4.5rem;
            width: 85%;
            max-width: 1200px;
        }

        .section-title {
            font-size: 2.2rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid rgba(255,255,255,0.05);
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .names-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1.5rem;
        }

        .name-item {
            background: rgba(15, 23, 42, 0.85);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 14px 28px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 14px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }

        .user-name {
            font-size: 1.6rem;
            font-weight: 700;
            color: #f8fafc;
        }

        .user-label {
            background: rgba(255,255,255,0.08);
            padding: 6px 12px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 800;
            color: #cbd5e1;
            font-family: 'JetBrains Mono', monospace;
            display: flex;
            align-items: center;
        }

        .section.viewers .names-grid { gap: 1rem; }
        .section.viewers .name-item {
            padding: 8px 16px;
            background: transparent;
            border: none;
            box-shadow: none;
        }
        .section.viewers .user-name {
            font-size: 1.2rem;
            font-weight: 600;
            color: #64748b;
        }
    </style>
</head>
<body>
    <div id="credits-container"></div>

    <script>
        const MODULES = {
            'subscribers': { label: '🌟 Abonnés', color: '#fbbf24' },
            'gifters':     { label: '🎁 Mécènes (Gifts)', color: '#34d399' },
            'bits':        { label: '💎 Bits & Donations', color: '#fb7185' },
            'raiders':     { label: '🚀 Raids Reçus', color: '#fb923c' },
            'followers':   { label: '💙 Nouveaux Followers', color: '#a78bfa' },
            'vips':        { label: '⭐ VIPs (Guests)', color: '#f472b6' },
            'moderators':  { label: '🛡️ Modérateurs', color: '#a3e635' },
            'chatters':    { label: '💬 Chatters', color: '#22d3ee' },
            'viewers':     { label: '👀 Viewers', color: '#94a3b8' }
        };

        // Fonction pour formater les minutes en "2h15" ou "45 min"
        function formatWatchtime(minutes) {
            if (!minutes || minutes <= 0) return '';
            let h = Math.floor(minutes / 60);
            let m = minutes % 60;
            let timeStr = h > 0 ? `${h}h${m < 10 ? '0'+m : m}` : `${m} min`;
            return `<span class="user-label" style="font-size:0.75rem; color:#38bdf8; background:rgba(56, 189, 248, 0.1); border: 1px solid rgba(56, 189, 248, 0.2);"><i class="fas fa-clock" style="margin-right: 6px;"></i>${timeStr}</span>`;
        }

        async function loadCredits() {
            try {
                const res = await fetch('/api/credits/data');
                const data = await res.json();
                
                const stats = data.stats;
                const config = data.config;
                
                let html = `<h1 class="main-title">${config.main_title || 'MERCI À TOUS !'}</h1>`;
                let allImportantUsers = new Set();

                // 1. CATÉGORIES IMPORTANTES
                for (let key of config.order) {
                    if (key === 'viewers') continue; 
                    if (!stats[key] || stats[key].length === 0) continue;
                    
                    html += `<div class="section ${key}">`;
                    html += `<h2 class="section-title" style="color: ${MODULES[key] ? MODULES[key].color : '#fff'}">${MODULES[key] ? MODULES[key].label : key}</h2>`;
                    html += `<div class="names-grid">`;
                    
                    stats[key].forEach(user => {
                        allImportantUsers.add(user.name.toLowerCase());
                        
                        let labelHtml = user.label ? `<span class="user-label">${user.label}</span>` : '';
                        let watchtimeHtml = formatWatchtime(user.watchtime); // Ajout du badge temps
                        
                        html += `<div class="name-item"><span class="user-name">${user.name}</span>${labelHtml}${watchtimeHtml}</div>`;
                    });
                    
                    html += `</div></div>`;
                }
                
                // 2. VIEWERS (Lurkers)
                if (stats['viewers'] && stats['viewers'].length > 0) {
                    let lurkers = stats['viewers'].filter(v => !allImportantUsers.has(v.name.toLowerCase()));
                    
                    if (lurkers.length > 0) {
                        html += `<div class="section viewers">`;
                        html += `<h2 class="section-title" style="color: ${MODULES['viewers'].color}">👀 Viewers (Lurkers)</h2>`;
                        html += `<div class="names-grid">`;
                        lurkers.forEach(user => {
                            let labelHtml = user.label ? `<span class="user-label" style="font-size:0.75rem; color:#64748b; background:transparent;">${user.label}</span>` : '';
                            let watchtimeHtml = formatWatchtime(user.watchtime); // Ajout du badge temps pour les lurkers aussi !
                            
                            html += `<div class="name-item"><span class="user-name">${user.name}</span>${labelHtml}${watchtimeHtml}</div>`;
                        });
                        html += `</div></div>`;
                    }
                }
                
                html += `<h1 class="sub-title">${config.subtitle || 'À BIENTÔT SUR LE LIVE'}</h1>`;
                
                const container = document.getElementById('credits-container');
                container.innerHTML = html;
                
                const totalHeight = container.scrollHeight;
                const duration = config.duration || 60;
                
                container.animate([
                    { transform: `translateY(0px)` },
                    { transform: `translateY(-${totalHeight + window.innerHeight}px)` }
                ], {
                    duration: duration * 1000,
                    easing: 'linear',
                    fill: 'forwards'
                });
                
            } catch (e) {
                console.error('Erreur lors du chargement du générique:', e);
            }
        }

        setTimeout(loadCredits, 2000);
    </script>
</body>
</html>
