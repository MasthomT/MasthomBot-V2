<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background: transparent; font-family: 'Inter', sans-serif; }

        #tiktok-widget {
            position: absolute;
            top: 50%; left: 50%;
            width: 360px;
            transform: translate(-50%, -50%) scale(0.85);
            opacity: 0;
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.5s ease;
            pointer-events: none;
        }
        #tiktok-widget.visible {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }

        .tiktok-frame-wrap {
            border-radius: 24px;
            overflow: hidden;
            border: 3px solid #fe2c55;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8), 0 0 30px rgba(254,44,85,0.35);
            background: #000;
        }

        .tiktok-badge {
            display: flex; align-items: center; gap: 8px; justify-content: center;
            background: #fe2c55; color: #fff; font-weight: 900; font-size: 0.75rem;
            text-transform: uppercase; letter-spacing: 0.08em; padding: 8px;
        }

        video { display: block; width: 360px; max-height: 640px; background: #000; }
    </style>
</head>
<body>

    <div id="tiktok-widget">
        <div class="tiktok-frame-wrap">
            <div class="tiktok-badge">🎵 TikTok</div>
            <video id="tiktok-video" playsinline preload="auto"></video>
        </div>
    </div>

    <script>
        const _log = (m) => { try { console.log('[tiktok]', m); } catch (e) {} };

        const widget = document.getElementById('tiktok-widget');
        const video = document.getElementById('tiktok-video');

        // Connexion SSE auto-réparante : si le bot redémarre (ou coupure réseau), la
        // connexion est rétablie automatiquement. Sans ça, l'overlay reste "sourd" dans
        // OBS après un redémarrage et ne reçoit plus jamais les events.
        let eventSource = null;
        let fermetureVolontaire = false;

        function fermerSSE() {
            // Libère le slot de connexion (OBS limite ~6 connexions/hôte, partagées entre
            // toutes les sources) pour que la vidéo puisse charger.
            fermetureVolontaire = true;
            if (eventSource) { eventSource.close(); eventSource = null; }
        }

        function connecterSSE() {
            fermetureVolontaire = false;
            _log('SSE connexion…');
            eventSource = new EventSource('/overlay_events');
            eventSource.onopen = () => _log('SSE OUVERTE ✓');
            eventSource.onmessage = (e) => {
                try {
                    const data = JSON.parse(e.data);
                    if (data.type === 'show_tiktok' && data.url) {
                        _log('show_tiktok → je libère le slot SSE et je charge la vidéo');
                        // On ferme la connexion SSE AVANT de charger : ça libère le créneau
                        // réseau dont la vidéo a besoin (sinon elle reste bloquée).
                        fermerSSE();
                        showTikTok(data.url);
                    }
                } catch (err) {}
            };
            eventSource.onerror = () => {
                if (!fermetureVolontaire && eventSource && eventSource.readyState === EventSource.CLOSED) {
                    setTimeout(connecterSSE, 3000);
                }
            };
        }
        connecterSSE();

        // Si une nouvelle vidéo démarre pendant le délai de fondu de la précédente, le nettoyage
        // différé de l'ancienne ne doit pas écraser le src de la nouvelle — d'où ce garde-fou.
        let hideCleanupTimer = null;

        function hideTikTok() {
            stopRetry();
            widget.classList.remove('visible');
            hideCleanupTimer = setTimeout(() => {
                video.pause();
                video.src = '';
                hideCleanupTimer = null;
                // La vidéo a libéré sa connexion : on rouvre le SSE pour le prochain event.
                if (!eventSource) connecterSSE();
            }, 600);
        }

        let loadWatch = null;
        function showTikTok(url) {
            if (hideCleanupTimer) {
                clearTimeout(hideCleanupTimer);
                hideCleanupTimer = null;
            }
            // La vidéo est servie sur un PORT SÉPARÉ (8001) pour qu'OBS lui donne son propre
            // pool de connexions (sinon les overlays du port 8000 saturent le quota et la
            // vidéo ne charge jamais). On reconstruit l'URL absolue avec le même hostname.
            let videoUrl = url;
            if (url.startsWith('/')) {
                videoUrl = location.protocol + '//' + location.hostname + ':8001' + url;
            }
            video.src = videoUrl;
            video.load(); // force le démarrage du chargement (CEF ne le fait pas toujours seul)
            lireVideo();
            // Sentinelle : si la vidéo n'est pas chargée en 6s, c'est qu'elle reste en attente
            // (connexion non aboutie / pool OBS saturé).
            if (loadWatch) clearTimeout(loadWatch);
            loadWatch = setTimeout(() => {
                if (video.readyState < 2) {
                    _log('VIDÉO NE CHARGE PAS (readyState=' + video.readyState + ', net=' + video.networkState + ') — connexion bloquée ?');
                }
            }, 6000);
        }

        let retryTimer = null;
        function stopRetry() { if (retryTimer) { clearInterval(retryTimer); retryTimer = null; } }

        function lireVideo() {
            // Démarrage MUET = seul autoplay garanti dans OBS (aucune politique ne le bloque).
            // On réessaie en boucle tant que ça ne joue pas (bat la suspension d'OBS), puis
            // une fois en lecture on tente d'activer le son.
            video.muted = true;
            const tenter = () => { const p = video.play(); if (p && p.catch) p.catch(() => {}); };
            tenter();
            stopRetry();
            retryTimer = setInterval(() => {
                if (video.ended) { stopRetry(); return; }
                if (!video.paused) {
                    stopRetry();
                    // La vidéo joue (muette) : on tente le son. Si OBS re-met en pause,
                    // on revient en muet pour au moins garder l'image à l'écran.
                    video.muted = false;
                    setTimeout(() => { if (video.paused) { video.muted = true; video.play().catch(() => {}); } }, 200);
                    return;
                }
                tenter();
            }, 400);
        }

        video.addEventListener('loadeddata', () => {
            _log('vidéo CHARGÉE → affichage');
            widget.classList.add('visible');
        });
        video.addEventListener('playing', () => { _log('▶ LECTURE EN COURS'); stopRetry(); });
        // Si OBS réaffiche la source (changement de scène), on relance la lecture
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden && widget.classList.contains('visible') && video.paused && video.src) {
                lireVideo();
            }
        });
        video.addEventListener('ended', () => { stopRetry(); hideTikTok(); });
        video.addEventListener('error', () => {
            const code = video.error ? video.error.code : '?';
            _log('VIDÉO ERREUR code=' + code + ' (URL inaccessible/expirée ?)');
            hideTikTok();
        });
    </script>
</body>
</html>
