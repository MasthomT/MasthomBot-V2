<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* === PUR CSS POUR OBS : GARANTIE 100% BLANC ET LISIBLE === */
        :root {
            --bg-color: rgba(15, 23, 42, 0.95);
            --border-color: rgba(99, 102, 241, 0.6);
            --text-main: #ffffff; /* FORCÉ EN BLANC */
            --text-muted: #94a3b8;
            --accent: #818cf8;
            --accent-dark: #4f46e5;
        }

        body { 
            margin: 0; 
            overflow: hidden; 
            background: transparent; 
            font-family: 'Inter', sans-serif; 
            color: var(--text-main); 
        }

        #poll-widget {
            position: absolute; 
            bottom: 40px; 
            left: 40px; 
            width: 550px;
            background: var(--bg-color); 
            backdrop-filter: blur(20px);
            border: 2px solid var(--border-color); 
            border-radius: 24px;
            padding: 2rem; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.8), 0 0 30px rgba(99, 102, 241, 0.2);
            transform: translateX(-150%); 
            opacity: 0;
            transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.8s ease;
        }

        #poll-widget.visible { 
            transform: translateX(0); 
            opacity: 1; 
        }

        .header { 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid #334155; padding-bottom: 1rem; margin-bottom: 1.5rem; 
        }
        .header-title { 
            display: flex; align-items: center; gap: 8px; 
            color: var(--accent); font-weight: 900; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.1em; 
        }
        .poll-logo {
            width: 24px; height: 24px; border-radius: 50%; border: 1px solid var(--accent); box-shadow: 0 0 10px rgba(129, 140, 248, 0.4);
        }
        .header-votes { 
            font-size: 0.9rem; font-weight: 700; color: var(--text-muted); 
            background: #1e293b; padding: 4px 12px; border-radius: 8px; 
        }
        
        .question { 
            font-size: 1.6rem; font-weight: 900; color: #ffffff; 
            margin: 0 0 1.5rem 0; line-height: 1.3; text-shadow: 0 2px 4px rgba(0,0,0,0.8); 
        }

        .options-container { 
            display: flex; flex-direction: column; gap: 1rem; margin-bottom: 1.5rem; 
        }
        
        /* Les barres de choix */
        .opt-card { 
            position: relative; background: #1e293b; border-radius: 16px; overflow: hidden; 
            border: 1px solid #475569; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); 
        }
        .opt-bar { 
            position: absolute; top: 0; left: 0; height: 100%; 
            background: rgba(79, 70, 229, 0.8); border-right: 2px solid var(--accent); 
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); 
            box-shadow: 0 0 15px rgba(79, 70, 229, 0.5); 
        }
        .opt-content { 
            position: relative; z-index: 10; display: flex; align-items: center; 
            justify-content: space-between; padding: 1rem 1.25rem; min-height: 70px; 
        }
        .opt-left { 
            display: flex; align-items: flex-start; gap: 12px; flex: 1; padding-right: 1rem; 
        }
        .opt-badge { 
            background: #0f172a; border: 1px solid var(--accent); color: #c7d2fe; 
            padding: 4px 10px; border-radius: 8px; font-size: 0.9rem; font-weight: 900; 
            white-space: nowrap; margin-top: 2px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); 
        }
        /* LE TEXTE FORCÉ EN BLANC PUR */
        .opt-text { 
            color: #ffffff; font-weight: 700; font-size: 1.15rem; line-height: 1.3; 
            text-shadow: 0 2px 5px rgba(0,0,0,0.9); word-break: break-word;
        }
        .opt-pct { 
            color: #ffffff; font-weight: 900; font-size: 2rem; 
            text-shadow: 0 0 15px rgba(255,255,255,0.4), 0 2px 4px rgba(0,0,0,0.8); 
        }

        .footer-note { 
            background: rgba(30, 58, 138, 0.5); border: 1px solid rgba(99, 102, 241, 0.4); 
            border-radius: 12px; padding: 1rem; text-align: center; 
        }
        .footer-note p { margin: 0; font-size: 0.9rem; font-weight: 700; color: #e2e8f0; }
        .footer-note span { color: #34d399; font-weight: 900; font-size: 1.1rem; padding: 0 4px; }
        
        /* Point clignotant */
        @keyframes pulse-dot {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(129, 140, 248, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(129, 140, 248, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(129, 140, 248, 0); }
        }
        .dot {
            width: 12px; height: 12px; background: var(--accent); border-radius: 50%;
            display: inline-block; animation: pulse-dot 2s infinite;
        }
    </style>
</head>
<body>

    <div id="poll-widget">
        <!-- EN-TÊTE -->
        <div class="header">
            <div class="header-title">
                <img src="/static/logo-felix.png" alt="Logo" class="poll-logo" onerror="this.style.display='none'">
                <span class="dot"></span>
                Sondage en cours
            </div>
            <div id="poll-total" class="header-votes">0 vote(s)</div>
        </div>

        <!-- QUESTION -->
        <h3 id="poll-question" class="question">Chargement de la question...</h3>

        <!-- CHOIX -->
        <div id="poll-options" class="options-container">
            <!-- Injecté dynamiquement -->
        </div>

        <!-- INSTRUCTION CHAT -->
        <div class="footer-note">
            <p>👉 Tapez <span>!choix 1</span>, <span>!choix 2</span>... dans le chat !</p>
        </div>
    </div>

    <script>
        const widget = document.getElementById('poll-widget');
        const optionsContainer = document.getElementById('poll-options');
        const questionEl = document.getElementById('poll-question');
        const totalEl = document.getElementById('poll-total');

        const VISIBLE_DURATION = 20000; 
        const HIDDEN_DURATION = 90000;  
        
        let isPollActive = false;
        let isWidgetVisible = false;
        let forceShowUntil = 0; 

        const ip = window.location.hostname;
        const port = window.location.port ? ':' + window.location.port : '';
        const apiUrl = `http://${ip}${port}/api/v1/poll/active`;

        const eventSource = new EventSource(`http://${ip}:3005/events`);
        eventSource.onmessage = (e) => {
            const data = JSON.parse(e.data);
            if (data.type === 'show_poll' && isPollActive) {
                showWidget();
                forceShowUntil = Date.now() + VISIBLE_DURATION;
            }
        };

        async function fetchPollData() {
            try {
                const res = await fetch(apiUrl);
                const data = await res.json();
                
                isPollActive = data.active;

                if (isPollActive) {
                    questionEl.textContent = data.question;
                    totalEl.textContent = `${data.total_votes} vote(s)`;
                    
                    let optionsHtml = '';
                    for (let i = 1; i <= 4; i++) {
                        if (data.options[i]) {
                            const votes = data.results[i] || 0;
                            const percent = data.total_votes > 0 ? Math.round((votes / data.total_votes) * 100) : 0;
                            
                            // INJECTION AVEC LES CLASSES CSS PURES
                            optionsHtml += `
                                <div class="opt-card">
                                    <div class="opt-bar" style="width: ${percent}%;"></div>
                                    <div class="opt-content">
                                        <div class="opt-left">
                                            <span class="opt-badge">!choix ${i}</span>
                                            <span class="opt-text">${data.options[i]}</span>
                                        </div>
                                        <div class="opt-pct">${percent}%</div>
                                    </div>
                                </div>
                            `;
                        }
                    }
                    optionsContainer.innerHTML = optionsHtml;
                } else if (isWidgetVisible) {
                    hideWidget();
                }
            } catch (err) {
                console.error("Erreur de récupération du sondage:", err);
            }
        }

        setInterval(fetchPollData, 2000);
        fetchPollData();

        function showWidget() {
            widget.classList.add('visible');
            isWidgetVisible = true;
        }

        function hideWidget() {
            widget.classList.remove('visible');
            isWidgetVisible = false;
        }

        const sleep = (ms) => new Promise(r => setTimeout(r, ms));

        async function runVisibilityCycle() {
            while (true) {
                if (isPollActive) {
                    if (Date.now() > forceShowUntil) {
                        showWidget();
                    }
                    await sleep(VISIBLE_DURATION);
                    
                    while (Date.now() <= forceShowUntil) {
                        await sleep(1000);
                    }
                    
                    hideWidget();
                    await sleep(HIDDEN_DURATION);  
                } else {
                    hideWidget();
                    await sleep(5000);
                }
            }
        }

        setTimeout(runVisibilityCycle, 3000);

    </script>
</body>
</html>
