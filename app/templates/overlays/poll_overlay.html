<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: rgba(15, 23, 42, 0.95);
            --border-color: rgba(99, 102, 241, 0.6);
            --accent: #818cf8;
        }

        body { margin: 0; overflow: hidden; background: transparent; font-family: 'Inter', sans-serif; }

        /* 🟦 LE WIDGET LARGE ET CENTRÉ (DESIGN ORIGINAL) */
        #poll-widget {
            position: absolute; 
            top: 30px; 
            left: 50%; 
            width: 1050px; 
            background: var(--bg-color); 
            backdrop-filter: blur(20px);
            border: 2px solid var(--border-color); 
            border-radius: 24px;
            padding: 1.5rem 2rem; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.8), 0 0 30px rgba(99, 102, 241, 0.3);
            
            /* Animation : Glisse depuis le HAUT */
            transform: translateX(-50%) translateY(-150%); 
            opacity: 0;
            transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.8s ease;
        }

        #poll-widget.visible { 
            transform: translateX(-50%) translateY(0); 
            opacity: 1; 
        }

        .poll-layout { display: flex; align-items: center; gap: 2rem; }
        .poll-info { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .options-container { flex: 1.3; display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; }

        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; padding-bottom: 0.8rem; margin-bottom: 1rem; }
        .header-title { display: flex; align-items: center; gap: 8px; color: var(--accent); font-weight: 900; font-size: 0.9rem; text-transform: uppercase; }
        .question { font-size: 1.4rem; font-weight: 900; color: #ffffff; margin: 0 0 1rem 0; line-height: 1.3; }

        .opt-card { position: relative; background: #1e293b; border-radius: 16px; overflow: hidden; border: 1px solid #475569; }
        .opt-bar { position: absolute; top: 0; left: 0; height: 100%; background: rgba(79, 70, 229, 0.8); transition: width 1s ease; }
        .opt-content { position: relative; z-index: 10; display: flex; align-items: center; justify-content: space-between; padding: 0.75rem 1rem; min-height: 60px; }
        .opt-text { color: #ffffff; font-weight: 700; font-size: 0.95rem; }
        .opt-pct { color: #ffffff; font-weight: 900; font-size: 1.4rem; }

        .footer-note { background: rgba(30, 58, 138, 0.5); border: 1px solid rgba(99, 102, 241, 0.4); border-radius: 12px; padding: 0.75rem; text-align: center; }
        .footer-note p { margin: 0; font-size: 0.85rem; font-weight: 700; color: #e2e8f0; }
        .footer-note span { color: #34d399; font-weight: 900; }
    </style>
</head>
<body>

    <div id="poll-widget">
        <div class="poll-layout">
            <div class="poll-info">
                <div class="header">
                    <div class="header-title">Sondage Fel-X</div>
                    <div id="poll-total" style="color: #94a3b8; font-weight: 700;">0 vote(s)</div>
                </div>
                <h3 id="poll-question" class="question">Chargement...</h3>
                <div class="footer-note">
                    <p>👉 Tapez <span>1</span>, <span>2</span>... pour voter !</p>
                </div>
            </div>
            <div id="poll-options" class="options-container"></div>
        </div>
    </div>

    <script>
        const widget = document.getElementById('poll-widget');
        const optionsContainer = document.getElementById('poll-options');
        const questionEl = document.getElementById('poll-question');
        const totalEl = document.getElementById('poll-total');
        let hideTimer;

        // ✅ Connexion au port 8000
        const eventSource = new EventSource('/overlay_events');

        eventSource.onmessage = (e) => {
            const data = JSON.parse(e.data);
            if (data.type === 'show_poll') {
                updateAndShow();
            }
        };

        async function updateAndShow() {
            try {
                const res = await fetch('/api/v1/poll/active');
                const data = await res.json();
                
                if (data.active) {
                    questionEl.textContent = data.question;
                    totalEl.textContent = `${data.total_votes} vote(s)`;
                    
                    let html = '';
                    for (let i = 1; i <= 4; i++) {
                        if (data.options[i]) {
                            const pct = data.total_votes > 0 ? Math.round((data.results[i] / data.total_votes) * 100) : 0;
                            html += `
                                <div class="opt-card">
                                    <div class="opt-bar" style="width: ${pct}%"></div>
                                    <div class="opt-content">
                                        <span class="opt-text">${data.options[i]}</span>
                                        <span class="opt-pct">${pct}%</span>
                                    </div>
                                </div>`;
                        }
                    }
                    optionsContainer.innerHTML = html;
                    
                    // On montre le widget original
                    widget.classList.add('visible');
                    
                    // Disparition après 20 secondes
                    clearTimeout(hideTimer);
                    hideTimer = setTimeout(() => widget.classList.remove('visible'), 20000);
                }
            } catch (err) { console.error(err); }
        }
    </script>
</body>
</html>
