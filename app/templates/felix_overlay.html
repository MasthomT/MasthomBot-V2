<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0; padding: 0; overflow: hidden; background: transparent;
            display: flex; align-items: center; justify-content: center; height: 100vh;
        }
        
        /* LE NOUVEAU BOUTON RECTANGULAIRE */
        #button-container {
            width: 260px; /* Largeur du rectangle */
            height: 180px; /* Hauteur du rectangle */
            background: rgba(15, 23, 42, 0.6); /* Fond sombre légèrement opaque */
            border-radius: 25px; /* Coins bien arrondis */
            display: flex; 
            align-items: center; 
            justify-content: center; /* Centre la patte parfaitement */
            border: 2px solid rgba(255, 255, 255, 0.08); /* Petite bordure élégante */
            backdrop-filter: blur(8px); /* Effet verre flouté en arrière-plan */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: all 0.4s ease;
        }

        /* La boîte de la patte (légèrement rétrécie pour rentrer dans le rectangle) */
        #svg-wrapper {
            width: 110px;
            height: 110px;
            transition: color 0.4s ease, filter 0.4s ease;
        }

        /* On force le SVG à remplir sa boîte */
        #svg-wrapper svg {
            width: 100%;
            height: 100%;
        }

        /* L'arme secrète : on écrase le noir de ton SVG pour appliquer nos couleurs ! */
        #svg-wrapper svg path, 
        #svg-wrapper svg g {
            fill: currentColor !important;
        }

        /* ÉTAT ABSENT : Rouge pur */
        .absent {
            color: #f43f5e;
            filter: drop-shadow(0 0 15px rgba(244, 63, 94, 0.8));
        }

        /* ÉTAT PRÉSENT : Vert pur */
        .present {
            color: #10b981;
            filter: drop-shadow(0 0 15px rgba(16, 185, 129, 0.8));
        }
    </style>
</head>
<body>

    <div id="button-container">
        <div id="svg-wrapper" class="absent">
            <svg xmlns="http://www.w3.org/2000/svg" version="1.0" width="1280.000000pt" height="1280.000000pt" viewBox="0 0 1280.000000 1280.000000" preserveAspectRatio="xMidYMid meet">
            <metadata>
            Created by potrace 1.15, written by Peter Selinger 2001-2017
            </metadata>

            </g>
            </svg>
        </div>
    </div>

    <script>
        const wrapper = document.getElementById('svg-wrapper');
        let currentStatus = null;
        
        async function checkFelix() {
            try {
                // Interrogation du statut avec l'anti-cache pour forcer OBS à lire la nouvelle info !
                const response = await fetch('/api/deck/status?t=' + new Date().getTime());
                if (!response.ok) return;
                
                const data = await response.json();
                
                // Mise à jour de la couleur uniquement
                if (data.felix_present !== currentStatus) {
                    currentStatus = data.felix_present;
                    if (currentStatus === true) {
                        wrapper.classList.remove('absent');
                        wrapper.classList.add('present');
                    } else {
                        wrapper.classList.remove('present');
                        wrapper.classList.add('absent');
                    }
                }
            } catch (e) {
                console.error("Erreur de polling Félix:", e);
            }
        }

        // Vérification toutes les secondes
        setInterval(checkFelix, 1000);
        checkFelix();
    </script>
</body>
</html>
