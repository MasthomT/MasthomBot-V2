<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', path='css/common.css') }}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: transparent; }
        .emote {
            position: absolute;
            bottom: -150px;
            animation: rise linear forwards;
            will-change: transform;
        }
        @keyframes rise {
            from { transform: translateY(0) rotate(0deg); opacity: 1; }
            to { transform: translateY(-120vh) rotate(360deg); opacity: 0.8; }
        }
    </style>
</head>
<body>
    <div id="wall"></div>
<script>
    const socket = io();
    const wall = document.getElementById('wall');

    socket.on('new_event', (data) => {
        if (data.type === 'emote_rain') {
            data.details.urls.forEach((url, index) => {
                // On ajoute un léger délai entre chaque emote pour l'effet "explosion"
                setTimeout(() => {
                    const img = document.createElement('img');
                    img.src = url;
                    img.className = 'emote';
                    img.style.left = (Math.random() * 90) + "vw";
                    img.style.width = (Math.random() * 40 + 60) + "px";
                    img.style.animationDuration = (Math.random() * 2 + 2) + "s";
                    
                    document.body.appendChild(img);
                    setTimeout(() => img.remove(), 4000);
                }, index * 50); // 50ms d'écart entre chaque emote du spam
            });
        }
    });
</script>

</body>
</html>
