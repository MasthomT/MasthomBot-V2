<!DOCTYPE html>
<html lang="fr">
<head>
    <link rel="stylesheet" href="{{ url_for('static', path='css/common.css') }}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - MasthomBot</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #23272a;
            color: #b9bbbe;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background-color: #2c2f33;
            padding: 2rem;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            border: 1px solid #40444b;
        }
        h1 { color: #fff; margin-bottom: 1.5rem; }
        .btn-twitch {
            background-color: #9146FF;
            color: white;
            padding: 10px 20px;
            border-radius: 4px;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
            transition: background-color 0.2s;
        }
        .btn-twitch:hover { background-color: #772ce8; }
        .flash {
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 4px;
            background-color: #f04747;
            color: white;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>Connexion Requise</h1>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <p>Veuillez vous connecter avec votre compte Twitch pour continuer.</p>
        <br>
        <a href="#">
            Se connecter avec Twitch
        </a>
    </div>
</body>
</html>
