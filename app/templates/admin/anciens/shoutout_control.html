<!DOCTYPE html>
<html lang="fr">
<head>
    <link rel="stylesheet" href="{{ url_for('static', path='css/common.css') }}">
    <meta charset="UTF-8">
    <title>Test Proxy Twitch</title>
    <style>
        body { background: #111; color: #fff; font-family: sans-serif; padding: 20px; text-align: center; }
        input { padding: 10px; width: 300px; }
        button { padding: 10px 20px; cursor: pointer; background: #9146FF; border: none; color: white; font-weight: bold; }
        video { margin-top: 20px; width: 80%; max-width: 800px; border: 1px solid #444; }
    </style>
</head>
<body>
    <h1>Test Proxy Twitch Resilient</h1>
    <input type="text" id="slug" placeholder="Slug du clip (ex: BitterLazyTrout...)">
    <button onclick="test()">Tester</button>
    <div id="status" style="margin-top:10px; color:#aaa;"></div>
    <div id="container"></div>

    <script>
        async function test() {
            const slug = document.getElementById('slug').value;
            const status = document.getElementById('status');
            const container = document.getElementById('container');
            
            if(!slug) return;
            status.innerText = "Résolution en cours...";
            container.innerHTML = "";

            try {
                const req = await fetch('/api/resolve_clip', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ slug: slug })
                });
                const data = await req.json();

                if(data.success) {
                    status.innerHTML = `✅ Proxy OK: <a href="${data.proxy_url}" target="_blank">${data.proxy_url}</a>`;
                    const v = document.createElement('video');
                    v.src = data.proxy_url;
                    v.controls = true;
                    v.autoplay = true;
                    container.appendChild(v);
                } else {
                    status.innerText = "❌ Erreur: " + JSON.stringify(data);
                }
            } catch(e) {
                status.innerText = "❌ Erreur Fetch: " + e.message;
            }
        }
    </script>
</body>
</html>
