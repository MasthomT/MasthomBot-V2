<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Gestionnaire de Clips</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; padding-bottom: 100px; }
        .header { padding: 20px; background: #1e293b; text-align: center; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; padding: 20px; }
        .clip-card { background: #334155; border-radius: 8px; overflow: hidden; cursor: pointer; border: 4px solid transparent; transition: 0.2s; position: relative; }
        .clip-card:hover { transform: scale(1.02); }
        .clip-card img { width: 100%; height: auto; display: block; }
        .clip-info { padding: 10px; font-size: 14px; }
        .clip-info strong { display: block; margin-bottom: 5px; }
        .clip-info span { color: #94a3b8; }
        
        #action-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #0f172a; padding: 15px; text-align: center; border-top: 2px solid #334155; z-index: 100; box-shadow: 0 -10px 20px rgba(0,0,0,0.5); }
        #btn-launch { padding: 12px 24px; font-size: 18px; font-weight: bold; border: none; border-radius: 8px; color: white; background: #475569; cursor: not-allowed; transition: 0.3s; }
        #btn-launch.ready { background: #6366f1; cursor: pointer; box-shadow: 0 0 15px rgba(99, 102, 241, 0.5); }
    </style>
</head>
<body>

    <div class="header">
        <h1>🎬 Clips du Mois</h1>
        <form method="GET" action="/admin/clips_manager">
            <input type="date" name="start_date" value="{{ start_date or '' }}" required style="padding: 5px;">
            <input type="date" name="end_date" value="{{ end_date or '' }}" required style="padding: 5px;">
            <button type="submit" style="padding: 6px 15px; background: #2dd4bf; border: none; border-radius: 4px; font-weight: bold; cursor: pointer;">Chercher</button>
        </form>
    </div>

    <div class="grid" id="clips-grid">
        {% for clip in clips %}
        <div class="clip-card" 
             data-id="{{ clip.id }}" 
             data-thumb="{{ clip.thumbnail_url }}" 
             data-duration="{{ clip.duration }}" 
             data-creator="{{ clip.creator_name }}" 
             onclick="toggleClip(this)">
            
            <img src="{{ clip.thumbnail_url }}" alt="Thumbnail">
            <div class="clip-info">
                <strong>{{ clip.title }}</strong>
                <span>👁️ {{ clip.view_count }} vues | ⏱️ {{ clip.duration }}s | 👤 {{ clip.creator_name }}</span>
            </div>
        </div>
        {% else %}
        <p style="text-align: center; width: 100%;">Aucun clip trouvé ou lancez une recherche.</p>
        {% endfor %}
    </div>

    <div id="action-bar">
        <h3>Clips sélectionnés : <span id="counter">0</span> / 4 max</h3>
        <button id="btn-launch" disabled>▶️ LANCER LA CHORÉGRAPHIE SUR OBS</button>
    </div>

    <script>
        let selectedClips = [];

        function toggleClip(card) {
            const clipData = {
                id: card.dataset.id,
                thumb: card.dataset.thumb,
                duration: parseFloat(card.dataset.duration),
                title: card.querySelector('.clip-info strong').innerText,
                creator: card.dataset.creator
            };

            const index = selectedClips.findIndex(c => c.id === clipData.id);

            if (index > -1) {
                selectedClips.splice(index, 1);
                card.style.borderColor = "transparent";
            } else {
                // Limite max à 4 clips
                if (selectedClips.length >= 4) {
                    alert("Maximum 4 clips sélectionnés !");
                    return;
                }
                selectedClips.push(clipData);
                card.style.borderColor = "#2dd4bf"; 
            }

            updateActionBar();
        }

        function updateActionBar() {
            document.getElementById('counter').innerText = selectedClips.length;
            const btn = document.getElementById('btn-launch');
            
            // Le bouton s'active si on a entre 1 et 4 clips !
            if (selectedClips.length >= 1 && selectedClips.length <= 4) {
                btn.disabled = false;
                btn.classList.add('ready');
            } else {
                btn.disabled = true;
                btn.classList.remove('ready');
            }
        }

        document.getElementById('btn-launch').addEventListener('click', async () => {
            if (selectedClips.length < 1 || selectedClips.length > 4) return; // ✅ LA BONNE CONDITION !

            try {
                // On envoie le JSON complet avec les 5 infos par clip
                const response = await fetch('/admin/clips/trigger_quad', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ clips: selectedClips })
                });

                if (response.ok) {
                    alert("C'est parti sur OBS !");
                } else {
                    alert("Erreur lors de l'envoi.");
                }
            } catch (error) {
                console.error("Erreur:", error);
            }
        });
    </script>
</body>
</html>
