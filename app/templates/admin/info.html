<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administration - Infos & Planning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: #e2e8f0; }
        .config-card { background-color: #1e293b; border: 1px solid #334155; }
        .input-dark { background-color: #0f172a; border: 1px solid #334155; color: #f1f5f9; }
        .input-dark:focus { border-color: #6366f1; outline: none; }
         .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="font-sans antialiased flex min-h-screen">

    {% include 'admin/sidebar.html' %}

    <main class="flex-1 p-6 md:p-10">
        <header class="mb-10">
            <h1 class="text-3xl font-extrabold text-white tracking-tight">Infos & Planning TEST</h1>
            <p class="text-slate-400 mt-1">Gérez la présentation de votre chaîne, vos réseaux et vos événements de stream.</p>
        </header>

        <script>
            if (window.location.search.includes('saved=true')) {
                document.write(`
                    <div class="mb-6 bg-green-500/20 border border-green-500 text-green-400 px-4 py-3 rounded-2xl font-bold">
                        <i class="fas fa-check-circle mr-2"></i> Paramètres synchronisés avec succès !
                    </div>
                `);
            }
        </script>

        <form action="/admin/info/save" method="POST" onsubmit="prepareScheduleData()" class="space-y-8">
            <input type="hidden" name="schedule_json" id="schedule_json">
            
            <div class="grid grid-cols-1 xl:grid-cols-12 gap-8">
                
                <div class="xl:col-span-4 space-y-6">
                    <section class="config-card p-6 rounded-3xl shadow-2xl">
                        <h2 class="text-xs font-black text-slate-500 uppercase mb-6 tracking-widest flex items-center gap-2">
                            <i class="fas fa-share-alt text-indigo-400"></i> Réseaux Sociaux
                        </h2>
                        <div class="space-y-4">
                            <div class="relative">
                                <i class="fab fa-twitch absolute left-4 top-1/2 -translate-y-1/2 text-purple-500"></i>
                                <input type="text" name="social_twitch" value="{{ info.social_twitch if info and info.social_twitch else '' }}" placeholder="Twitch" class="input-dark w-full rounded-xl p-3 pl-12 text-sm">
                            </div>
                            <div class="relative">
                                <i class="fab fa-discord absolute left-4 top-1/2 -translate-y-1/2 text-indigo-500"></i>
                                <input type="text" name="social_discord" value="{{ info.social_discord if info and info.social_discord else '' }}" placeholder="Discord" class="input-dark w-full rounded-xl p-3 pl-12 text-sm">
                            </div>
                            <div class="relative">
                                <i class="fab fa-youtube absolute left-4 top-1/2 -translate-y-1/2 text-red-500"></i>
                                <input type="text" name="social_youtube" value="{{ info.social_youtube if info and info.social_youtube else '' }}" placeholder="YouTube" class="input-dark w-full rounded-xl p-3 pl-12 text-sm">
                            </div>
                            <div class="relative">
                                <i class="fab fa-tiktok absolute left-4 top-1/2 -translate-y-1/2 text-pink-500"></i>
                                <input type="text" name="social_tiktok" value="{{ info.social_tiktok if info and info.social_tiktok else '' }}" placeholder="TikTok" class="input-dark w-full rounded-xl p-3 pl-12 text-sm">
                            </div>
                            <div class="relative">
                                <i class="fas fa-hand-holding-dollar absolute left-4 top-1/2 -translate-y-1/2 text-green-500"></i>
                                <input type="text" name="social_tips" value="{{ info.social_tips if info and info.social_tips else '' }}" placeholder="Don (Tips)" class="input-dark w-full rounded-xl p-3 pl-12 text-sm">
                            </div>
                        </div>
                    </section>
                </div>

                <div class="xl:col-span-8 space-y-6">
                    <section class="config-card p-8 rounded-3xl shadow-2xl">
                        <h2 class="text-xs font-black text-slate-500 uppercase mb-6 tracking-widest flex items-center gap-2">
                            <i class="fas fa-align-left text-indigo-400"></i> À propos de la chaîne
                        </h2>
                        <textarea name="about_text" rows="4" class="w-full input-dark rounded-2xl p-4 text-sm leading-relaxed" placeholder="Présentation de la chaîne...">{{ info.about_text if info and info.about_text else '' }}</textarea>
                    </section>

                    <section class="config-card p-8 rounded-3xl shadow-2xl">
                        <h2 class="text-xs font-black text-slate-500 uppercase mb-6 tracking-widest flex items-center gap-2">
                            <i class="fas fa-calendar-alt text-indigo-400"></i> Planning de Diffusion
                        </h2>
                        
                        <div id="schedule-container" class="space-y-3 mb-6"></div>
                        
                        <h2 class="text-xs font-black text-indigo-400 uppercase mb-6 tracking-widest flex items-center gap-2 mt-8">
                            <i class="fas fa-star text-amber-400"></i> Lives Spéciaux
                        </h2>
                        <div id="special-container" class="space-y-3 mb-6"></div>

                        <div class="flex flex-wrap gap-3">
                            <button type="button" onclick="addScheduleRow()" class="text-xs font-bold bg-slate-700 hover:bg-slate-600 px-4 py-2.5 rounded-xl transition-all text-white">
                                <i class="fas fa-plus mr-2 text-slate-400"></i> Ajouter un créneau régulier
                            </button>
                            <button type="button" onclick="addSpecialScheduleRow()" class="text-xs font-bold bg-indigo-600/20 text-indigo-400 border border-indigo-500/30 hover:bg-indigo-600 hover:text-white px-4 py-2.5 rounded-xl transition-all">
                                <i class="fas fa-star mr-2 text-amber-400"></i> Ajouter un Live Spécial
                            </button>
                        </div>
                    </section>

                    <div class="flex justify-end pt-4">
                        <button type="submit" class="bg-indigo-600 hover:bg-indigo-500 text-white font-black py-4 px-12 rounded-2xl shadow-xl transition-all">
                            <i class="fas fa-save mr-2"></i> ENREGISTRER TOUTES LES INFOS
                        </button>
                    </div>
                </div>
            </div>
        </form>
    </main>

    <script>
        const container = document.getElementById('schedule-container');
        const specialContainer = document.getElementById('special-container');
        const days = ["Dimanche", "Lundi", "Mardi", "Mercredi", "Jeudi", "Vendredi", "Samedi"];
        
        // CORRECTION LIGNE 152 : Injection sécurisée sans parse qui plante
        let savedSchedule = {{ (info.schedule_json or '[]') | safe }};

        // Rendu des lignes chargées de la BDD
        if (savedSchedule && savedSchedule.length > 0) {
            savedSchedule.forEach(s => {
                if (s.is_special) {
                    addSpecialScheduleRow(s.date, s.time, s.title, s.discord_notify);
                } else {
                    addScheduleRow(s.d, s.time, s.title);
                }
            });
        } else {
            addScheduleRow(1, "18:00", "Live Soirée");
        }

        // 1. Ajout d'un live classique (Récurrent)
        function addScheduleRow(d = 1, time = "18:00", title = "Live Soirée") {
            const row = document.createElement('div');
            row.className = 'schedule-row regular-row flex gap-3 items-center bg-slate-900/40 p-3 rounded-xl border border-slate-700/50';
            row.innerHTML = `
                <span class="text-xs font-black text-slate-500 uppercase tracking-wider w-20">Régulier</span>
                <select class="sch-day input-dark rounded-xl p-2 text-sm bg-slate-900">
                    ${days.map((day, i) => `<option value="${i}" ${i == d ? 'selected' : ''}>${day}</option>`).join('')}
                </select>
                <input type="time" class="sch-time input-dark rounded-xl p-2 text-sm" value="${time}">
                <input type="text" class="sch-title flex-1 input-dark rounded-xl p-2 text-sm" placeholder="Titre du stream" value="${title}">
                <button type="button" onclick="this.parentElement.remove()" class="text-red-500 hover:text-red-400 p-2"><i class="fas fa-trash"></i></button>
            `;
            container.appendChild(row);
        }

        // 2. Ajout d'un Live Spécial (Date précise + Option Discord)
        function addSpecialScheduleRow(date = "", time = "21:00", title = "", discordNotify = true) {
            if (!date) {
                date = new Date().toISOString().split('T')[0];
            }
            const row = document.createElement('div');
            row.className = 'schedule-row special-row flex gap-3 items-center bg-indigo-950/20 p-3 rounded-xl border border-indigo-500/30';
            row.innerHTML = `
                <span class="text-xs font-black text-indigo-400 uppercase tracking-wider w-20 flex items-center gap-1"><i class="fas fa-star text-amber-400"></i> Spécial</span>
                <input type="date" class="sch-date input-dark rounded-xl p-2 text-sm text-white" value="${date}">
                <input type="time" class="sch-time input-dark rounded-xl p-2 text-sm" value="${time}">
                <input type="text" class="sch-title flex-1 input-dark rounded-xl p-2 text-sm" placeholder="Nom de l'événement spécial" value="${title}">
                <label class="flex items-center gap-2 cursor-pointer text-xs font-bold text-slate-400 bg-slate-900 px-3 py-2 rounded-xl border border-slate-700">
                    <input type="checkbox" class="sch-notify rounded border-slate-600 bg-slate-800 text-indigo-600 focus:ring-indigo-500" ${discordNotify ? 'checked' : ''}>
                    Alerte Discord
                </label>
                <button type="button" onclick="this.parentElement.remove()" class="text-red-500 hover:text-red-400 p-2"><i class="fas fa-trash"></i></button>
            `;
            specialContainer.appendChild(row);
        }

        // Collecte avant envoi POST
        function prepareScheduleData() {
            const rows = document.querySelectorAll('.schedule-row');
            const data = [];
            
            rows.forEach(row => {
                const isSpecial = row.classList.contains('special-row');
                if (isSpecial) {
                    const dateVal = row.querySelector('.sch-date').value;
                    data.push({
                        is_special: true,
                        date: dateVal,
                        d: new Date(dateVal).getDay(),
                        time: row.querySelector('.sch-time').value,
                        title: row.querySelector('.sch-title').value,
                        discord_notify: row.querySelector('.sch-notify').checked
                    });
                } else {
                    data.push({
                        is_special: false,
                        d: parseInt(row.querySelector('.sch-day').value),
                        time: row.querySelector('.sch-time').value,
                        title: row.querySelector('.sch-title').value
                    });
                }
            });
            
            document.getElementById('schedule_json').value = JSON.stringify(data);
        }
    </script>
</body>
</html>
