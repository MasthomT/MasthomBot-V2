<!DOCTYPE html>
<html lang="fr">
<head>
	<meta charset="UTF-8">
	<title>Connexion Admin — MasthomBOT</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<script src="https://cdn.tailwindcss.com"></script>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-[#0f172a] min-h-screen flex items-center justify-center">
	<div class="w-full max-w-sm bg-[#1e293b] border border-slate-800 rounded-2xl shadow-2xl p-8">
		<div class="flex flex-col items-center mb-6">
			<div class="w-14 h-14 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/20 mb-3">
				<i class="fas fa-cat text-white text-2xl"></i>
			</div>
			<span class="text-xl font-black text-white tracking-tighter">
				Masthom<span class="text-indigo-500">BOT</span>
			</span>
			<p class="text-slate-500 text-sm mt-1">Accès panel admin</p>
		</div>

		{% if error %}
		<div class="bg-red-500/10 border border-red-500/30 text-red-400 text-sm rounded-xl px-4 py-3 mb-4">
			Mot de passe incorrect.
		</div>
		{% endif %}

		<form method="post" action="/admin/login" class="space-y-4">
			<div>
				<label class="block text-xs font-bold text-slate-400 uppercase tracking-wide mb-2">Mot de passe</label>
				<input type="password" name="password" required autofocus
					class="w-full bg-slate-900/60 border border-slate-700 rounded-xl px-4 py-2.5 text-white text-sm focus:outline-none focus:border-indigo-500" />
			</div>
			<button type="submit"
				class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-sm rounded-xl py-2.5 transition-all">
				Se connecter
			</button>
		</form>
	</div>
</body>
</html>
