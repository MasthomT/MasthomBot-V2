<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Horloge OBS Animée</title>
    <!-- Import de la police Montserrat -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200&display=swap" rel="stylesheet">
    <!-- Import de FontAwesome pour l'icône -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background: transparent;
            color: white; /* Texte et logo en blanc */
            font-family: 'Montserrat', sans-serif;
            font-weight: 200;
            font-size: 40px; /* Taille globale de l'overlay */
            height: 100vh;
            display: flex;
            align-items: center;
            overflow: hidden;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.9);
        }

        /* La boîte qui aligne le logo et l'heure */
        .container {
            display: flex;
            align-items: center;
            gap: 15px; /* L'écartement entre l'horloge et les chiffres */
            padding-left: 20px;
        }

        /* 🎬 ANIMATION : Le battement du logo */
        .logo {
            animation: pulse 1.5s ease-in-out infinite; 
        }

        @keyframes pulse {
            0% { transform: scale(1); }       /* Taille de base */
            50% { transform: scale(1.2); }    /* Grossissement fluide */
            100% { transform: scale(1); }     /* Retour à la normale */
        }

        /* Embellissement du texte brut */
        #horloge {
            letter-spacing: 2px; /* Aère légèrement les chiffres */
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Boîte 1 : Le logo horloge animé -->
        <div class="logo">
            <i class="fa-regular fa-clock"></i>
        </div>
        
        <!-- Boîte 2 : Le texte de l'heure mis à jour par JavaScript -->
        <div id="horloge">--:--</div>
    </div>

    <script>
        // 🕐 L'horloge se calcule LOCALEMENT dans le navigateur, chaque seconde.
        // On n'interroge plus le serveur : pas de dépendance réseau, pas de cache,
        // et surtout plus jamais d'heure figée dans OBS.
        const elHorloge = document.getElementById('horloge');

        function mettreAJourHeure() {
            const maintenant = new Date();
            const h = String(maintenant.getHours()).padStart(2, '0');
            const m = String(maintenant.getMinutes()).padStart(2, '0');
            elHorloge.innerText = `${h}:${m}`;
        }

        // Mise à jour immédiate puis chaque seconde
        mettreAJourHeure();
        setInterval(mettreAJourHeure, 1000);

        // Filet de sécurité : si OBS a gelé la page (source non rendue) puis la réaffiche,
        // on resynchronise dès qu'elle redevient visible.
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) mettreAJourHeure();
        });
    </script>
</body>
</html>
